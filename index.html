<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMate 測試艙 - 實時多端協同</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #F5F7FA; font-family: -apple-system, sans-serif; color: #2A303C; padding-bottom: 40px; }
        * { box-sizing: border-box; }
        .container { max-width: 500px; margin: 0 auto; padding: 16px; }
        .card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 16px; }
        .btn { width: 100%; background: #FF6B2B; color: #fff; border: none; border-radius: 12px; padding: 12px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: #4A7CFF; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; color: #8A8FA3; font-weight: bold; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; border: 1px solid #ECEEF2; border-radius: 8px; padding: 10px; outline: none; }
        .record-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #F5F7FA; }
        .badge { font-size: 10px; background: #EEF3FF; color: #4A7CFF; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .loading { text-align: center; color: #FF6B2B; font-weight: bold; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useEffect } = React;

        // ==========================================
        // 🛠️ 請填入你第一步在 Supabase 拿到的憑證
        // ==========================================
        const SUPABASE_URL = "你的_SUPABASE_URL"; 
        const SUPABASE_ANON_KEY = "你的_SUPABASE_ANON_KEY";
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [records, setRecords] = useState([]);
            const [myKey, setMyKey] = useState(localStorage.getItem("gemini_key") || "");
            const [myName, setMyName] = useState(localStorage.getItem("user_name") || "探險家_" + Math.floor(Math.random()*1000));
            const [isLoading, setIsLoading] = useState(false);

            // 手動記帳表單狀態
            const [title, setTitle] = useState("");
            const [amount, setAmount] = useState("");
            const [category, setCategory] = useState("餐飲");

            // 儲存個人設定到本地快取
            const saveProfile = () => {
                localStorage.setItem("gemini_key", myKey);
                localStorage.setItem("user_name", myName);
                alert("⚙️ 設定已儲存！");
            };

            // 1. 從雲端獲取初始歷史數據
            const fetchInitialRecords = async () => {
                const { data, error } = await supabase
                    .from('trip_records')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (data) setRecords(data);
            };

            // 2. 核心：啟動 WebSocket 多端秒級實時同步監聽
            useEffect(() => {
                fetchInitialRecords();

                const channel = supabase
                    .channel('realtime-ledger')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trip_records' }, payload => {
                        // 📡 攔截到雲端廣播（可能是別人的手機提交了數據），立刻無感塞入本地視圖
                        setRecords(prev => [payload.new, ...prev]);
                    })
                    .subscribe();

                return () => supabase.removeChannel(channel);
            }, []);

            // 3. 手動記帳提交至雲端
            const handleManualSubmit = async (ev) => {
                ev.preventDefault();
                if (!title || !amount) return alert("請填寫品項和金額！");

                const { error } = await supabase.from('trip_records').insert([{
                    title,
                    amount: parseFloat(amount),
                    category,
                    payer_name: myName,
                    device_source: "手動輸入"
                }]);

                if (!error) {
                    setTitle(""); setAmount("");
                } else {
                    alert("上傳失敗: " + error.message);
                }
            };

            // 4. 核心：Gemini AI 多語種小票收據識別
            const handleFileChange = async (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                if (!myKey) return alert("請先在下方填入你的 Gemini API Key！");

                setIsLoading(true);

                // 將圖片轉為 Gemini 需要的 Base64 格式
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        
                        // 調用 2026 年最新最划算的 gemini-2.5-flash 模型
                        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${myKey}`;
                        
                        const prompt = "你是一個跨國旅行對帳專家。請嚴格審計這張包含日/韓/法/英/中語種的收據/小票。精確提取出：1.商戶名或商品名(只要名字，不超過10個字) 2.消費總金額(必須是純數字，如120或55.5) 3.消費類別(只能從 '餐飲', '購物', '門票', '交通', '住宿', '其他' 中挑選一個最貼切的)。請嚴格、只返回一個標準的 JSON 對象，格式如下，不要帶有任何 markdown 標籤或額外解釋：{\"title\":\"商戶名\",\"amount\":100,\"category\":\"餐飲\"}";

                        const response = await fetch(apiUrl, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: prompt },
                                        { inlineData: { mimeType: file.type, data: base64Data } }
                                    ]
                                }]
                            })
                        });

                        const resData = await response.json();
                        const rawText = resData.candidates[0].content.parts[0].text;
                        
                        // 清理可能被大模型污染的 markdown 符號
                        const cleanJsonText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                        const parsedResult = JSON.parse(cleanJsonText);

                        // 🤖 解析成功後，直接秒級打入 Supabase 雲端數據庫
                        const { error } = await supabase.from('trip_records').insert([{
                            title: parsedResult.title || "AI識別帳目",
                            amount: parseFloat(parsedResult.amount) || 0,
                            category: parsedResult.category || "其他",
                            payer_name: myName,
                            device_source: "Gemini AI 掃單"
                        }]);

                        if (error) alert("AI數據同步雲端失敗: " + error.message);

                    } catch (err) {
                        console.error(err);
                        alert("AI 解析出錯，請確保小票清晰且 API Key 正確！系統返回：" + err.message);
                    } finally {
                        setIsLoading(false);
                    }
                };
            };

            const totalSpend = records.reduce((sum, r) => sum + r.amount, 0);

            return e('div', { className: "container" },
                // 雲端實時狀態與看板
                e('div', { className: "card", style: { background: "#1A1D23", color: "#fff" } },
                    e('div', { style: { fontSize: 12, color: "#8A8FA3" } }, "📡 聯網測試艙 · 多端實時聚合看板"),
                    e('div', { style: { fontSize: 32, fontWeight: 900, margin: "10px 0" } }, `NT$ ${totalSpend.toLocaleString()}`),
                    e('div', { style: { fontSize: 12, opacity: 0.8 } }, `目前小隊共產生 ${records.length} 筆流水`)
                ),

                // 模組 1：Gemini AI 智能多語種掃單
                e('div', { className: "card" },
                    e('div', { style: { fontWeight: "bold", marginBottom: 10 } }, "📷 Gemini 多語種 AI 掃單"),
                    e('input', { type: "file", accept: "image/*", onChange: handleFileChange, style: { display: "none" }, id: "camera-input" }),
                    e('label', { htmlFor: "camera-input", className: "btn btn-secondary", style: { display: "block", textAlign: "center", cursor: "pointer" } }, "📸 拍攝或上傳多語種收據小票"),
                    isLoading && e('div', { className: "loading" }, "⏳ Gemini 2.5 多模態視覺芯片解析中...")
                ),

                // 模組 2：手動隨手記一筆
                e('div', { className: "card" },
                    e('div', { style: { fontWeight: "bold", marginBottom: 10 } }, "➕ 隨手記一筆"),
                    e('form', { onSubmit: handleManualSubmit },
                        e('div', { className: "input-group" }, e('label', null, "消費品項"), e('input', { type: "text", value: title, onChange: ev => setTitle(ev.target.value), placeholder: "例如：東京一蘭拉麵" })),
                        e('div', { className: "input-group" }, e('label', null, "金額"), e('input', { type: "number", step: "any", value: amount, onChange: ev => setAmount(ev.target.value), placeholder: "0.00" })),
                        e('div', { className: "input-group" }, e('label', null, "類別"), e('select', { value: category, onChange: ev => setCategory(ev.target.value) }, ['餐飲','購物','門票','交通','住宿','其他'].map(c => e('option', { key: c, value: c }, c)))),
                        e('button', { type: "submit", className: "btn" }, "送出入賬")
                    )
                ),

                // 模組 3：實時公共流水大賬本
                e('div', { className: "card" },
                    e('div', { style: { fontWeight: "bold", marginBottom: 10 } }, "🗺️ 小隊全端融合流水"),
                    records.length === 0 ? e('div', { style: { color: "#8A8FA3", textAlign: "center", padding: "20px" } }, "🍉 暫無公共賬目，等待小隊成員輸入") :
                    records.map(r => e('div', { key: r.id, className: "record-item" },
                        e('div', null, 
                            e('div', { style: { fontWeight: "bold", fontSize: "14px" } }, r.title),
                            e('div', { style: { fontSize: "11px", color: "#8A8FA3", marginTop: "2px" } }, `👤 ${r.payer_name} · `, e('span', { className: "badge" }, r.device_source))
                        ),
                        e('div', { style: { fontWeight: "900", color: "#FF6B2B" } }, `+$${r.amount}`)
                    ))
                ),

                // 模組 4：聯調測試身份設定
                e('div', { className: "card", style: { background: "#F9FAFB" } },
                    e('div', { style: { fontWeight: "bold", marginBottom: 10, fontSize: "13px" } }, "⚙️ 測試節點身份設定"),
                    e('div', { className: "input-group" }, e('label', null, "我的測試暱稱（區分誰付的錢）"), e('input', { type: "text", value: myName, onChange: ev => setMyName(ev.target.value) })),
                    e('div', { className: "input-group" }, e('label', null, "我的 Gemini API Key（本地快取，絕不上傳）"), e('input', { type: "password", value: myKey, onChange: ev => setMyKey(ev.target.value), placeholder: "AI 掃單必需" })),
                    e('button', { onClick: saveProfile, className: "btn", style: { background: "#1A1D23" } }, "保存設定")
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
