<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMate 旅行记账</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #F2F4F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { display: none; }
        .no-scroll { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; display: flex; gap: 10px; }
        
        /* 💡 酷炫的 AI 激光扫描动画 */
        @keyframes scanMove {
            0% { top: 0%; opacity: 0.3; }
            50% { top: 100%; opacity: 1; }
            100% { top: 0%; opacity: 0.3; }
        }
        .scanner-line {
            position: absolute;
            left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #FF6B2B, transparent);
            box-shadow: 0 0 15px #FF6B2B;
            animation: scanMove 2s infinite linear;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // ─── 1. DESIGN TOKENS ───
        const C = {
          bg: "#F2F4F7", card: "#FFFFFF", orange: "#FF6B2B", orangeLight: "#FFF0EA",
          blue: "#4A7CFF", blueLight: "#EEF3FF", green: "#2DC76D", greenLight: "#E8FAF1",
          yellow: "#FFB800", yellowLight: "#FFF8E0", ink: "#1A1D23", sub: "#8A8FA3",
          border: "#ECEEF2", red: "#FF4444", textMain: "#2A303C"
        };

        const TABS = [
          { key: "home", label: "旅程", icon: "🗺" },
          { key: "records", label: "账本", icon: "📒" },
          { key: "scan", label: "扫单", icon: "📷" },
          { key: "stats", label: "统计", icon: "📊" },
          { key: "members", label: "搭子", icon: "👥" },
        ];

        const CATEGORIES = ["餐饮", "购物", "门票", "交通", "住宿", "其他"];
        const CAT_COLORS = { 餐饮: C.orange, 购物: C.blue, 门票: C.yellow, 交通: C.green, 住宿: "#9B59B6", 其他: C.sub };
        const CAT_ICONS = { 餐饮: "🍜", 购物: "🛍️", 门票: "🎟️", 交通: "🚄", 住宿: "🏨", 其他: "📦" };

        const INITIAL_MEMBERS = [
          { id: 1, name: "小雨", emoji: "👩‍🦱", color: C.orange },
          { id: 2, name: "阿明", emoji: "👨‍🦳", color: C.blue },
          { id: 3, name: "Tony", emoji: "🧑‍🦰", color: C.green },
        ];

        const INITIAL_RECORDS = [
          { id: 1, title: "罗森全家桶咖啡", category: "餐饮", method: "现金", store: "Lawson", amount: 420, memberId: 1, day: 2, time: "08:12", lang: "日语" },
          { id: 2, title: "加贺温泉入游券", category: "门票", method: "Suica", store: "加賀温泉郷", amount: 1800, memberId: 2, day: 1, time: "14:30", lang: "日语" },
        ];

        // ─── 2. 公用基础 UI 组件 ───
        function Card({ children, style, onClick }) {
          return (
            <div onClick={onClick} style={{ background: C.card, borderRadius: 18, padding: 18, boxShadow: "0 4px 20px rgba(0,0,0,0.04)", cursor: onClick ? "pointer" : "default", transition: "all 0.2s", ...style }}>{children}</div>
          );
        }
        function Tag({ label, color, bg }) {
          return (
            <span style={{ fontSize: 11, fontWeight: 700, color: color || C.orange, background: bg || C.orangeLight, borderRadius: 8, padding: "3px 8px", display: "inline-block" }}>{label}</span>
          );
        }
        function MemberDot({ member, size = 36, onClick }) {
          if (!member) return null;
          return (
            <div onClick={onClick} style={{ width: size, height: size, borderRadius: "50%", background: member.color + "22", border: `2.5px solid ${member.color}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.45, flexShrink: 0, cursor: onClick ? "pointer" : "default" }}>{member.emoji}</div>
          );
        }
        function ProgressBar({ pct, color, height = 8 }) {
          return (
            <div style={{ background: C.border, borderRadius: 99, height, overflow: "hidden" }}>
              <div style={{ width: `${Math.min(pct, 100)}%`, height: "100%", background: color || C.green, borderRadius: 99, transition: "width 0.4s cubic-bezier(0.4, 0, 0.2, 1)" }} />
            </div>
          );
        }

        // ─── 3. 手动随手记弹窗组件 ───
        function QuickRecordModal({ isOpen, onClose, members, onSave, currentDay }) {
          if (!isOpen) return null;
          const [amount, setAmount] = useState("");
          const [title, setTitle] = useState("");
          const [category, setCategory] = useState("餐饮");
          const [payerId, setPayerId] = useState(members[0].id);

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!amount || !title) return alert("请完整填写金额和品项！");
            onSave({
              id: Date.now(), title, category, method: "现金", store: "本地商户",
              amount: parseFloat(amount), memberId: parseInt(payerId), day: currentDay,
              time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }), lang: "中文"
            });
            setAmount(""); setTitle(""); setCategory("餐饮"); onClose();
          };

          return (
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", zIndex: 1000, backdropFilter: "blur(4px)" }}>
              <div style={{ background: C.card, width: "100%", borderTopLeftRadius: 24, borderTopRightRadius: 24, padding: 24, paddingBottom: 40 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <span style={{ fontSize: 18, fontWeight: 800, color: C.ink }}>➕ 随手记 (Day {currentDay})</span>
                  <span onClick={onClose} style={{ fontSize: 24, color: C.sub, cursor: "pointer" }}>✕</span>
                </div>
                <form onSubmit={handleSubmit}>
                  <input type="number" placeholder="0.00" value={amount} onChange={e => setAmount(e.target.value)} style={{ width: "100%", border: "none", borderBottom: `2px solid ${C.border}`, fontSize: 36, fontWeight: 900, color: C.orange, padding: "8px 0", outline: "none", marginBottom: 20 }} autoFocus />
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8, display: "block" }}>账目品项</label>
                    <input type="text" placeholder="品项名称" value={title} onChange={e => setTitle(e.target.value)} style={{ width: "100%", background: C.bg, border: "none", borderRadius: 12, padding: "12px 16px", fontSize: 15, outline: "none" }} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8, display: "block" }}>消费类别</label>
                    <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }} className="no-scroll">
                      {CATEGORIES.map(cat => (
                        <div key={cat} onClick={() => setCategory(cat)} style={{ padding: "8px 16px", borderRadius: 10, background: category === cat ? CAT_COLORS[cat] + "15" : C.bg, border: `2px solid ${category === cat ? CAT_COLORS[cat] : "transparent"}`, color: category === cat ? CAT_COLORS[cat] : C.ink, fontWeight: 700, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>{CAT_ICONS[cat]} {cat}</div>
                      ))}
                    </div>
                  </div>
                  <div style={{ marginBottom: 24 }}>
                    <label style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8, display: "block" }}>付款人</label>
                    <div style={{ display: "flex", gap: 12 }}>
                      {members.map(m => (
                        <div key={m.id} onClick={() => setPayerId(m.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 12, background: payerId === m.id ? m.color + "15" : C.bg, border: `2px solid ${payerId === m.id ? m.color : "transparent"}`, cursor: "pointer" }}>
                          <MemberDot member={m} size={24} />
                          <span style={{ fontSize: 13, fontWeight: 700 }}>{m.name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <button type="submit" style={{ width: "100%", background: C.orange, color: "#fff", border: "none", borderRadius: 14, padding: "14px", fontSize: 16, fontWeight: 800 }}>确认记账</button>
                </form>
              </div>
            </div>
          );
        }


        // ─── 4. 核心视图组件 ───

        // 🗺 视图：旅程主看板 (增加自定义天数修改)
        function HomeScreen({ records, members, currentDay, setCurrentDay, onOpenAdd, note, setNote, totalDays, setTotalDays }) {
          const totalBudget = 300000;
          const [isEditingDays, setIsEditingDays] = useState(false);

          const dayRecords = useMemo(() => records.filter(r => r.day === currentDay), [records, currentDay]);
          const tripTotal = useMemo(() => records.reduce((sum, r) => sum + r.amount, 0), [records]);
          const budgetPct = useMemo(() => Math.round((tripTotal / totalBudget) * 100), [tripTotal]);

          // 根据动态自定义天数生成数组
          const daysArray = useMemo(() => Array.from({ length: totalDays }, (_, i) => i + 1), [totalDays]);

          return (
            <div style={{ padding: "16px 16px 90px" }}>
              
              {/* 自定义天数配置看板 */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, background: C.card, padding: "12px 16px", borderRadius: 16, boxShadow: "0 2px 10px rgba(0,0,0,0.02)" }}>
                <div>
                  <span style={{ fontSize: 12, color: C.sub, fontWeight: 700, display: "block" }}>🗺 当前旅程时限</span>
                  {isEditingDays ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
                      <input type="number" value={totalDays} onChange={e => setTotalDays(Math.max(1, parseInt(e.target.value) || 1))} onBlur={() => setIsEditingDays(false)} style={{ width: 60, padding: "4px 8px", fontSize: 16, fontWeight: 800, borderRadius: 8, border: `2px solid ${C.orange}`, outline: "none" }} autoFocus />
                      <span style={{ fontSize: 14, fontWeight: 700, color: C.ink }}>天</span>
                    </div>
                  ) : (
                    <span style={{ fontSize: 16, fontWeight: 800, color: C.ink, marginTop: 4, display: "inline-block" }}>日本中部北陆 · <span style={{ color: C.orange }}>{totalDays}天行程</span></span>
                  )}
                </div>
                <button onClick={() => setIsEditingDays(!isEditingDays)} style={{ border: "none", background: C.bg, padding: "6px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, color: C.sub, cursor: "pointer" }}>
                  {isEditingDays ? "锁定" : "✍️ 改天数"}
                </button>
              </div>

              {/* 动态时间线 */}
              <div style={{ marginBottom: 16 }}>
                <div className="no-scroll" style={{ paddingBottom: 8 }}>
                  {daysArray.map(d => (
                    <div key={d} onClick={() => setCurrentDay(d)} style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minWidth: 58, height: 64, borderRadius: 14, background: currentDay === d ? C.orange : C.card, color: currentDay === d ? "#fff" : C.ink, boxShadow: "0 2px 8px rgba(0,0,0,0.02)", cursor: "pointer", transition: "all 0.2s", flexShrink: 0 }}>
                      <span style={{ fontSize: 9, opacity: currentDay === d ? 0.8 : 0.5, fontWeight: 700 }}>DAY</span>
                      <span style={{ fontSize: 18, fontWeight: 900, marginTop: 1 }}>{d}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* 预算大卡片 */}
              <Card style={{ marginBottom: 16, background: `linear-gradient(135deg, ${C.ink} 0%, #2C323F 100%)`, color: "#fff" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <span style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", fontWeight: 600 }}>旅程实时累积支出</span>
                  <Tag label="当前汇率 JPY" color="#fff" bg="rgba(255,255,255,0.15)" />
                </div>
                <div style={{ fontSize: 30, fontWeight: 900, marginBottom: 12, letterSpacing: -1 }}>
                  ¥{tripTotal.toLocaleString()} <span style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", fontWeight: 500 }}>/ 预算 ¥{totalBudget.toLocaleString()}</span>
                </div>
                <ProgressBar pct={budgetPct} color={C.orange} />
              </Card>

              {/* 今日行程备忘 */}
              <Card style={{ marginBottom: 20, padding: "14px 18px" }}>
                <div style={{ fontSize: 12, color: C.sub, fontWeight: 800, marginBottom: 4 }}>📌 Day {currentDay} 随行备忘</div>
                <input type="text" value={note[currentDay] || ""} onChange={e => {
                  const val = e.target.value;
                  setNote(prev => ({ ...prev, [currentDay]: val }));
                }} placeholder="输入今天的路线、景点或待办事项..." style={{ width: "100%", border: "none", padding: "4px 0", fontSize: 14, fontWeight: 700, color: C.ink, outline: "none", background: "transparent" }} />
              </Card>

              {/* 消费列表标题 */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 15, fontWeight: 800, color: C.ink }}>Day {currentDay} 消费明细 ({dayRecords.length})</span>
                <button onClick={onOpenAdd} style={{ background: C.orangeLight, border: "none", borderRadius: 10, padding: "6px 12px", color: C.orange, fontWeight: 800, fontSize: 12 }}>➕ 随手记</button>
              </div>

              {dayRecords.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 0", color: C.sub, fontSize: 13, fontWeight: 600 }}>今天这一天还是空白的哦 ✈️</div>
              ) : (
                dayRecords.map(r => (
                  <Card key={r.id} style={{ marginBottom: 10, padding: 14 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 38, height: 38, borderRadius: 10, background: CAT_COLORS[r.category] + "15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{CAT_ICONS[r.category]}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, color: C.ink, fontSize: 14 }}>{r.title}</div>
                        <span style={{ fontSize: 11, color: C.sub, display: "inline-block", marginTop: 2 }}>{r.store} · {members.find(m => m.id === r.memberId)?.name}代付</span>
                      </div>
                      <div style={{ fontSize: 16, fontWeight: 900, color: C.ink }}>¥{r.amount}</div>
                    </div>
                  </Card>
                ))
              )}
            </div>
          );
        }

        // 📒 视图：账本
        function RecordsScreen({ records, members }) {
          return (
            <div style={{ padding: "16px 16px 90px" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: C.ink, marginBottom: 16 }}>全量记账流水</div>
              {records.map(r => (
                <Card key={r.id} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: C.orangeLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{CAT_ICONS[r.category]}</div>
                    <div style={{ flex: 1 }}><div style={{ fontWeight: 700 }}>{r.title}</div><div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>Day {r.day} · {r.store}</div></div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ fontSize: 16, fontWeight: 900 }}>¥{r.amount}</div>
                      <Tag label={r.lang} color={C.blue} bg={C.blueLight} />
                    </div>
                  </div>
                </Card>
              ))}
            </div>
          );
        }

        // 📷 视图：高保真智能扫单 (独立研发)
        function ScanScreen({ currentDay, members, onAddScannedRecord }) {
          const [image, setImage] = useState(null);
          const [scanState, setScanState] = useState("idle"); // idle | scanning | result
          const [selectedPayer, setSelectedPayer] = useState(members[0].id);

          // 离线高保真日语收据模拟解析数据
          const mockOcrResult = {
            store: "ローソン 金沢駅西口店",
            title: "大盛咖喱饭 + 绫鹰绿茶",
            category: "餐饮",
            amountJPY: 1340,
            amountCNY: 62, // 汇率实时换算
            items: ["1. カツカレー大盛 ¥980", "2. 綾鷹 緑茶 520ml ¥160", "3. 消費税8% ¥200"]
          };

          const handleFileChange = (e) => {
            if (e.target.files && e.target.files[0]) {
              setImage(URL.createObjectURL(e.target.files[0]));
              setScanState("scanning");
              
              // 模拟炫酷的 2.5 秒 AI 逐行分析动效
              setTimeout(() => {
                setScanState("result");
              }, 2500);
            }
          };

          const handleConfirm = () => {
            onAddScannedRecord({
              id: Date.now(),
              title: mockOcrResult.title,
              category: mockOcrResult.category,
              method: "智能扫单",
              store: mockOcrResult.store,
              amount: mockOcrResult.amountCNY, // 换算后入账
              memberId: selectedPayer,
              day: currentDay,
              time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
              lang: "日语小票"
            });
            // 归位
            setImage(null); setScanState("idle");
            alert("🎉 AI 识别成功！已自动翻译、汇率转换并计入 Day " + currentDay + " 账本！");
          };

          return (
            <div style={{ padding: "16px 16px 90px" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: C.ink, marginBottom: 4 }}>📷 AI 智能扫单跨境版</div>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 16 }}>拍摄日本小票，自动识别商品、翻译店家及完成实时汇率结算</div>

              {/* 状态 1：等待上传 */}
              {scanState === "idle" && (
                <label style={{ display: "block" }}>
                  <input type="file" accept="image/*" capture="camera" onChange={handleFileChange} style={{ display: "none" }} />
                  <div style={{ border: `2.5px dashed ${C.orange}50`, height: 260, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.orangeLight, borderRadius: 20, cursor: "pointer" }}>
                    <div style={{ fontSize: 52, marginBottom: 12 }}>📸</div>
                    <span style={{ fontWeight: 800, fontSize: 15, color: C.ink }}>点击启动相机 / 上传收据</span>
                    <span style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>支持罗森、药妆店等各种日语收据</span>
                  </div>
                </label>
              )}

              {/* 状态 2：酷炫 AI 扫描穿梭线动画 */}
              {scanState === "scanning" && (
                <Card style={{ position: "relative", height: 260, overflow: "hidden", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.ink }}>
                  {image && <img src={image} style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "cover", opacity: 0.4 }} />}
                  <div className="scanner-line" />
                  <div style={{ zIndex: 10, textAlign: "center", color: "#fff" }}>
                    <div style={{ fontSize: 32, marginBottom: 10 }}>⚡</div>
                    <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: 0.5 }}>TripMate AI 正在深度解析...</div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 6 }}>正在翻译提取日语明细及折算最新汇率</div>
                  </div>
                </Card>
              )}

              {/* 状态 3：AI 结构化解析结果 & 确认入账面板 */}
              {scanState === "result" && (
                <div style={{ animation: "fadeIn 0.3s ease" }}>
                  <Card style={{ background: C.ink, color: "#fff", marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid rgba(255,255,255,0.1)", paddingBottom: 10, marginBottom: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 14 }}>🏪 {mockOcrResult.store}</span></div>
                      <Tag label="🇯🇵 原始语种: 日语" color={C.orange} bg={C.orangeLight} />
                    </div>
                    
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", fontWeight: 700 }}>解析结果 (自动翻译)</div>
                    <div style={{ fontSize: 16, fontWeight: 800, margin: "6px 0 14px" }}>{mockOcrResult.title}</div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, background: "rgba(255,255,255,0.05)", padding: 12, borderRadius: 12, marginBottom: 14 }}>
                      <div>
                        <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>小票原额</span>
                        <div style={{ fontSize: 18, fontWeight: 900, marginTop: 2, color: C.yellow }}>¥{mockOcrResult.amountJPY} <span style={{ fontSize: 11 }}>JPY</span></div>
                      </div>
                      <div>
                        <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>本币实时结算</span>
                        <div style={{ fontSize: 18, fontWeight: 900, marginTop: 2, color: C.green }}>¥{mockOcrResult.amountCNY} <span style={{ fontSize: 11 }}>CNY</span></div>
                      </div>
                    </div>

                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 6 }}>小票明细摘要：</div>
                    {mockOcrResult.items.map((item, index) => (
                      <div key={index} style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", fontFamily: "monospace", padding: "2px 0" }}>{item}</div>
                    ))}
                  </Card>

                  {/* 代付确认选择器 */}
                  <Card style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: C.ink, marginBottom: 10 }}>确认代付旅伴</div>
                    <div style={{ display: "flex", gap: 10 }}>
                      {members.map(m => (
                        <div key={m.id} onClick={() => setSelectedPayer(m.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 12px", borderRadius: 12, background: selectedPayer === m.id ? m.color + "15" : C.bg, border: `2px solid ${selectedPayer === m.id ? m.color : "transparent"}`, cursor: "pointer", flex: 1, justifyContent: "center" }}>
                          <MemberDot member={m} size={22} />
                          <span style={{ fontSize: 12, fontWeight: 700 }}>{m.name}</span>
                        </div>
                      ))}
                    </div>
                  </Card>

                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => { setImage(null); setScanState("idle"); }} style={{ flex: 1, background: C.border, border: "none", padding: "14px", borderRadius: 14, fontWeight: 800, color: C.ink, cursor: "pointer" }}>重新拍摄</button>
                    <button onClick={handleConfirm} style={{ flex: 2, background: C.orange, border: "none", padding: "14px", borderRadius: 14, fontWeight: 800, color: "#fff", cursor: "pointer", boxShadow: `0 4px 12px ${C.orange}30` }}>确认并入账 (Day {currentDay})</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // 📊 视图：数据统计（预留骨架）
        function StatsScreen() { return <div style={{ padding: 16 }}><div style={{ fontSize: 18, fontWeight: 900, marginBottom: 16 }}>开销数据统计</div><Card style={{ color: C.sub }}>📊 准备在下一阶段接入分账结清算法</Card></div>; }
        // 👥 视图：搭子社交（预留个人中心设置）
        function MembersScreen() { return <div style={{ padding: 16 }}><div style={{ fontSize: 18, fontWeight: 900, marginBottom: 16 }}>旅行搭子与个人中心</div><Card style={{ color: C.sub }}>👥 这里将细化为搭子管理与B形式个人设置板块</Card></div>; }

        // ─── 5. APP 核心控制主骨架 ───
        function TripMateV2() {
          const [activeTab, setActiveTab] = useState("home");
          const [currentDay, setCurrentDay] = useState(1); // 默认切到第1天查看
          const [totalDays, setTotalDays] = useState(7); // ⚙️ 自定义天数核心状态，默认初始化为 7天
          
          const [records, setRecords] = useState(INITIAL_RECORDS);
          const [members] = useState(INITIAL_MEMBERS);
          const [isModalOpen, setIsModalOpen] = useState(false);

          const [note, setNote] = useState({
            1: "第一天落地中部国际机场，直奔金泽新干线！",
            2: "今天计划去兼六园，晚上吃近江町市场的海鲜饭。"
          });

          const renderScreen = () => {
            switch(activeTab) {
              case "home": return <HomeScreen records={records} members={members} currentDay={currentDay} setCurrentDay={setCurrentDay} onOpenAdd={() => setIsModalOpen(true)} note={note} setNote={setNote} totalDays={totalDays} setTotalDays={setTotalDays} />;
              case "records": return <RecordsScreen records={records} members={members} />;
              case "scan": return <ScanScreen currentDay={currentDay} members={members} onAddScannedRecord={(newRec) => setRecords([newRec, ...records])} />;
              case "stats": return <StatsScreen />;
              case "members": return <MembersScreen />;
              default: return <HomeScreen records={records} members={members} currentDay={currentDay} setCurrentDay={setCurrentDay} onOpenAdd={() => setIsModalOpen(true)} note={note} setNote={setNote} totalDays={totalDays} setTotalDays={setTotalDays} />;
            }
          };

          return (
            <div style={{ background: C.bg, minHeight: "100vh", position: "relative" }}>
              {renderScreen()}

              {/* 全局底部导航 */}
              <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255, 255, 255, 0.96)", backdropFilter: "blur(10px)", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "10px 0 24px", zIndex: 900 }}>
                {TABS.map(t => (
                  <div key={t.key} onClick={() => setActiveTab(t.key)} style={{ display: "flex", flexDirection: "column", alignItems: "center", cursor: "pointer", minWidth: 55 }}>
                    <span style={{ fontSize: 22, transform: activeTab === t.key ? "scale(1.12)" : "scale(1)", transition: "transform 0.2s" }}>{t.icon}</span>
                    <span style={{ fontSize: 10, marginTop: 4, fontWeight: 800, color: activeTab === t.key ? C.orange : C.textMain, opacity: activeTab === t.key ? 1 : 0.4 }}>{t.label}</span>
                  </div>
                ))}
              </div>

              <QuickRecordModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} members={members} currentDay={currentDay} onSave={(newRec) => setRecords([newRec, ...records])} />
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TripMateV2 />);
    </script>
</body>
</html>
