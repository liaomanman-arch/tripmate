<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>TripMate — 完整版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        body { background: #F2EFE9; padding: 20px; font-family: sans-serif; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: 10px auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select { width: 100%; margin: 8px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #D96B43; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .record { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { createClient } = supabase;
        const client = createClient("https://gpjbhfjrpcvgwqbemkvk.supabase.co", "sb_publishable_k3u9PuGwj9mUHM5g5K91Fw_GRB5GI0Y");

        const App = () => {
            const [records, setRecords] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            const fetchRecords = async () => {
                const { data } = await client.from('trip_records').select('*').order('created_at', { ascending: false });
                if (data) setRecords(data);
                setLoading(false);
            };

            React.useEffect(() => { fetchRecords(); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                await client.from('trip_records').insert([{ 
                    title: e.target.title.value, 
                    amount: parseFloat(e.target.amount.value),
                    category: e.target.category.value 
                }]);
                e.target.reset();
                fetchRecords();
            };

            return React.createElement('div', null,
                React.createElement('div', { className: 'card' },
                    React.createElement('h2', null, "TripMate 記帳"),
                    React.createElement('form', { onSubmit: handleSubmit },
                        React.createElement('input', { name: "title", placeholder: "品項", required: true }),
                        React.createElement('input', { name: "amount", type: "number", placeholder: "金額", required: true }),
                        React.createElement('select', { name: "category" }, 
                            ['餐飲','住宿','購物','交通'].map(c => React.createElement('option', { value: c }, c))
                        ),
                        React.createElement('button', { type: "submit" }, "入賬")
                    )
                ),
                React.createElement('div', { className: 'card' },
                    records.map(r => React.createElement('div', { key: r.id, className: 'record' }, 
                        React.createElement('span', null, r.title), 
                        React.createElement('b', null, "¥" + r.amount)
                    ))
                )
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
