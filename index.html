<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMate 旅行记账</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #F2F4F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; }
        /* 隐藏所有滚动条，保持极致清爽 */
        ::-webkit-scrollbar { display: none; }
        .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // ─── 1. DESIGN TOKENS (色彩与常量) ───
        const C = {
          bg: "#F2F4F7", card: "#FFFFFF", orange: "#FF6B2B", orangeLight: "#FFF0EA",
          blue: "#4A7CFF", blueLight: "#EEF3FF", green: "#2DC76D", greenLight: "#E8FAF1",
          yellow: "#FFB800", yellowLight: "#FFF8E0", ink: "#1A1D23", sub: "#8A8FA3",
          border: "#ECEEF2", red: "#FF4444", textMain: "#2A303C"
        };

        const TABS = [
          { key: "home", label: "旅程", icon: "🗺" },
          { key: "records", label: "账本", icon: "📒" },
          { key: "scan", label: "扫单", icon: "📷" },
          { key: "stats", label: "统计", icon: "📊" },
          { key: "members", label: "搭子", icon: "👥" },
        ];

        const CATEGORIES = ["餐饮", "购物", "门票", "交通", "住宿", "其他"];
        const CAT_COLORS = { 餐饮: C.orange, 购物: C.blue, 门票: C.yellow, 交通: C.green, 住宿: "#9B59B6", 其他: C.sub };
        const CAT_ICONS = { 餐饮: "🍜", 购物: "🛍️", 门票: "🎟️", 交通: "🚄", 住宿: "🏨", 其他: "📦" };

        // ─── 2. INITIAL REALISTIC STATE (初始化动态数据) ───
        const INITIAL_MEMBERS = [
          { id: 1, name: "小雨", emoji: "👩‍🦱", color: C.orange },
          { id: 2, name: "阿明", emoji: "👨‍🦳", color: C.blue },
          { id: 3, name: "Tony", emoji: "🧑‍🦰", color: C.green },
        ];

        const INITIAL_RECORDS = [
          { id: 1, title: "罗森全家桶咖啡", category: "餐饮", method: "现金", store: "Lawson", amount: 420, memberId: 1, day: 25, time: "08:12", lang: "日语" },
          { id: 2, title: "加贺温泉入游券", category: "门票", method: "Suica", store: "加賀温泉郷", amount: 1800, memberId: 2, day: 24, time: "14:30", lang: "日语" },
          { id: 3, title: "金泽黑咖喱饭", category: "餐饮", method: "现金", store: "ゴーゴーカレー", amount: 950, memberId: 1, day: 24, time: "12:05", lang: "日语" },
          { id: 4, title: "新干线特急券", category: "交通", method: "刷卡", store: "JR西日本", amount: 5600, memberId: 3, day: 23, time: "10:15", lang: "日语" },
        ];

        // ─── 3. 公用基础 UI 组件 ───
        function Card({ children, style, onClick }) {
          return (
            <div onClick={onClick} style={{ background: C.card, borderRadius: 18, padding: 18, boxShadow: "0 4px 20px rgba(0,0,0,0.04)", cursor: onClick ? "pointer" : "default", transition: "all 0.2s", ...style }}>{children}</div>
          );
        }
        function Tag({ label, color, bg }) {
          return (
            <span style={{ fontSize: 11, fontWeight: 700, color: color || C.orange, background: bg || C.orangeLight, borderRadius: 8, padding: "3px 8px", display: "inline-block" }}>{label}</span>
          );
        }
        function MemberDot({ member, size = 36, active = true }) {
          if (!member) return null;
          return (
            <div style={{ width: size, height: size, borderRadius: "50%", background: active ? member.color + "22" : "#f0f0f0", border: `2px solid ${active ? member.color : C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.45, flexShrink: 0, transition: "all 0.2s" }}>{member.emoji}</div>
          );
        }
        function ProgressBar({ pct, color, height = 8 }) {
          return (
            <div style={{ background: C.border, borderRadius: 99, height, overflow: "hidden" }}>
              <div style={{ width: `${Math.min(pct, 100)}%`, height: "100%", background: color || C.green, borderRadius: 99, transition: "width 0.4s cubic-bezier(0.4, 0, 0.2, 1)" }} />
            </div>
          );
        }

        // ─── 4. 功能组件：手写记账弹窗（Modal） ───
        function QuickRecordModal({ isOpen, onClose, members, onSave, currentDay }) {
          if (!isOpen) return null;
          const [amount, setAmount] = useState("");
          const [title, setTitle] = useState("");
          const [category, setCategory] = useState("餐饮");
          const [payerId, setPayerId] = useState(members[0].id);

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!amount || !title) return alert("请完整填写金额和品项！");
            onSave({
              id: Date.now(),
              title,
              category,
              method: "现金",
              store: "本地商户",
              amount: parseFloat(amount),
              memberId: parseInt(payerId),
              day: currentDay,
              time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
              lang: "中文"
            });
            // 重置表单
            setAmount(""); setTitle(""); setCategory("餐饮"); setPayerId(members[0].id);
            onClose();
          };

          return (
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", zIndex: 1000, animation: "fadeIn 0.2s ease" }}>
              <div style={{ background: C.card, width: "100%", borderTopLeftRadius: 24, borderTopRightRadius: 24, padding: 24, paddingBottom: 40, transform: "translateY(0)", transition: "transform 0.3s" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <span style={{ fontSize: 18, fontWeight: 800, color: C.ink }}>➕ 随手记 (Day {currentDay})</span>
                  <span onClick={onClose} style={{ fontSize: 24, color: C.sub, cursor: "pointer" }}>✕</span>
                </div>
                <form onSubmit={handleSubmit}>
                  <input type="number" placeholder="0.00" value={amount} onChange={e => setAmount(e.target.value)} style={{ width: "100%", border: "none", borderBottom: `2px solid ${C.border}`, fontSize: 36, fontWeight: 900, color: C.orange, padding: "8px 0", outline: "none", marginBottom: 20 }} autoFocus />
                  
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ block: "true", fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8, display: "block" }}>账目品项</label>
                    <input type="text" placeholder="例如：下午茶、药妆购买..." value={title} onChange={e => setTitle(e.target.value)} style={{ width: "100%", background: C.bg, border: "none", borderRadius: 12, padding: "12px 16px", fontSize: 15, outline: "none" }} />
                  </div>

                  <div style={{ marginBottom: 16 }}>
                    <label style={{ block: "true", fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8, display: "block" }}>消费类别</label>
                    <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }} className="no-scroll">
                      {CATEGORIES.map(cat => (
                        <div key={cat} onClick={() => setCategory(cat)} style={{ padding: "8px 16px", borderRadius: 10, background: category === cat ? CAT_COLORS[cat] + "15" : C.bg, border: `2px solid ${category === cat ? CAT_COLORS[cat] : "transparent"}`, color: category === cat ? CAT_COLORS[cat] : C.ink, fontWeight: 700, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>{CAT_ICONS[cat]} {cat}</div>
                      ))}
                    </div>
                  </div>

                  <div style={{ marginBottom: 24 }}>
                    <label style={{ block: "true", fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8, display: "block" }}>代付旅伴</label>
                    <div style={{ display: "flex", gap: 12 }}>
                      {members.map(m => (
                        <div key={m.id} onClick={() => setPayerId(m.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 12, background: payerId === m.id ? m.color + "15" : C.bg, border: `2px solid ${payerId === m.id ? m.color : "transparent"}`, cursor: "pointer" }}>
                          <MemberDot member={m} size={28} />
                          <span style={{ fontSize: 13, fontWeight: 700, color: C.ink }}>{m.name}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <button type="submit" style={{ width: "100%", background: C.orange, color: "#fff", border: "none", borderRadius: 14, padding: "14px", fontSize: 16, fontWeight: 800, cursor: "pointer", boxShadow: `0 4px 12px ${C.orange}40` }}>确认记账</button>
                </form>
              </div>
            </div>
          );
        }

        // ─── 5. 各页面视图 (SCREENS) ───
        
        // 🗺 视图：旅程主看板
        function HomeScreen({ records, members, currentDay, setCurrentDay, onOpenAdd, note, setNote }) {
          const [isEditingNote, setIsEditingNote] = useState(false);
          const totalBudget = 500000; // 假设总预算 50万日元

          // 动态计算该 Day 账目
          const dayRecords = useMemo(() => records.filter(r => r.day === currentDay), [records, currentDay]);
          const dayTotal = useMemo(() => dayRecords.reduce((sum, r) => sum + r.amount, 0), [dayRecords]);
          const tripTotal = useMemo(() => records.reduce((sum, r) => sum + r.amount, 0), [records]);
          const budgetPct = useMemo(() => Math.round((tripTotal / totalBudget) * 105), [tripTotal]);

          return (
            <div style={{ padding: "16px 16px 90px" }}>
              {/* 行程时间线 & Day 切换 */}
              <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 12, marginBottom: 16 }} className="no-scroll">
                {[23, 24, 25, 26, 27].map(d => (
                  <div key={d} onClick={() => setCurrentDay(d)} style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minWidth: 64, height: 74, borderRadius: 16, background: currentDay === d ? C.orange : C.card, color: currentDay === d ? "#fff" : C.ink, boxShadow: "0 4px 12px rgba(0,0,0,0.03)", cursor: "pointer", transition: "all 0.2s" }}>
                    <span style={{ fontSize: 11, opacity: currentDay === d ? 0.8 : 0.5, fontWeight: 700 }}>DAY</span>
                    <span style={{ fontSize: 22, fontWeight: 900, marginTop: 2 }}>{d}</span>
                  </div>
                ))}
              </div>

              {/* 核心预算卡片 */}
              <Card style={{ marginBottom: 16, background: `linear-gradient(135deg, ${C.ink} 0%, #2C323F 100%)`, color: "#fff" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", fontWeight: 600 }}>日本中部北陆总预算进度</span>
                  <Tag label="汇率 JPY" color="#fff" bg="rgba(255,255,255,0.15)" />
                </div>
                <div style={{ fontSize: 32, fontWeight: 900, marginBottom: 12, letterSpacing: -1 }}>
                  ¥{tripTotal.toLocaleString()} <span style={{ fontSize: 14, color: "rgba(255,255,255,0.5)", fontWeight: 500 }}>/ ¥{totalBudget.toLocaleString()}</span>
                </div>
                <ProgressBar pct={budgetPct} color={C.orange} />
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 8, fontWeight: 700 }}>
                  <span>已用 {budgetPct}%</span>
                  <span>剩余 ¥{(totalBudget - tripTotal).toLocaleString()}</span>
                </div>
              </Card>

              {/* 每日备注编辑 */}
              <Card style={{ marginBottom: 20, padding: "14px 18px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 12, color: C.sub, fontWeight: 800 }}>📌 今日行程备忘</span>
                  <span onClick={() => setIsEditingNote(!isEditingNote)} style={{ fontSize: 12, color: C.orange, fontWeight: 700, cursor: "pointer" }}>{isEditingNote ? "完成" : "编辑"}</span>
                </div>
                {isEditingNote ? (
                  <input type="text" value={note} onChange={e => setNote(e.target.value)} onBlur={() => setIsEditingNote(false)} style={{ width: "100%", border: "none", borderBottom: `1.5px solid ${C.orange}`, padding: "4px 0", fontSize: 14, fontWeight: 600, color: C.ink, outline: "none", background: "transparent" }} autoFocus />
                ) : (
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.ink }}>{note || "点击编辑为今天添加路线备忘..."}</div>
                )}
              </Card>

              {/* 今日数据面板 */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div>
                  <span style={{ fontSize: 16, fontWeight: 800, color: C.ink }}>Day {currentDay} 消费流水</span>
                  <span style={{ fontSize: 12, color: C.sub, marginLeft: 8 }}>共 {dayRecords.length} 笔</span>
                </div>
                <button onClick={onOpenAdd} style={{ background: C.orangeLight, border: "none", borderRadius: 10, padding: "6px 12px", color: C.orange, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>➕ 随手记</button>
              </div>

              {dayRecords.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 0", color: C.sub, fontSize: 14, fontWeight: 600 }}>今天还没有账目哦，点击右上角记录一笔吧！</div>
              ) : (
                dayRecords.map(r => {
                  const payer = members.find(m => m.id === r.memberId);
                  return (
                    <Card key={r.id} style={{ marginBottom: 10, padding: 14 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <MemberDot member={payer} size={38} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 700, color: C.ink, fontSize: 15 }}>{r.title}</div>
                          <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
                            <Tag label={r.category} color={CAT_COLORS[r.category]} bg={CAT_COLORS[r.category] + "15"} />
                            <Tag label={r.lang} color={C.sub} bg={C.border} />
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 18, fontWeight: 900, color: C.ink }}>¥{r.amount}</div>
                          <div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>{r.time}</div>
                        </div>
                      </div>
                    </Card>
                  );
                })
              )}
            </div>
          );
        }

        // 📒 视图：全量账本明细
        function RecordsScreen({ records, members }) {
          const [filterCat, setFilterCat] = useState("全部");

          // 动态分类过滤
          const filteredRecords = useMemo(() => {
            if (filterCat === "全部") return records;
            return records.filter(r => r.category === filterCat);
          }, [records, filterCat]);

          return (
            <div style={{ padding: "16px 16px 90px" }}>
              <div style={{ fontSize: 20, fontWeight: 900, color: C.ink, marginBottom: 16 }}>旅程全量明细</div>
              
              {/* 分类快捷筛选条 */}
              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 12, marginBottom: 16 }} className="no-scroll">
                {["全部", ...CATEGORIES].map(cat => (
                  <div key={cat} onClick={() => setFilterCat(cat)} style={{ padding: "8px 16px", borderRadius: 12, background: filterCat === cat ? C.ink : C.card, color: filterCat === cat ? "#fff" : C.sub, fontWeight: 700, fontSize: 13, cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.02)", whiteSpace: "nowrap", transition: "all 0.2s" }}>
                    {cat === "全部" ? "🌍 全部" : `${CAT_ICONS[cat]} ${cat}`}
                  </div>
                ))}
              </div>

              {filteredRecords.length === 0 ? (
                <div style={{ textAlign: "center", padding: "60px 0", color: C.sub, fontSize: 14 }}>暂无该品类的消费纪录</div>
              ) : (
                filteredRecords.map(r => {
                  const payer = members.find(m => m.id === r.memberId);
                  return (
                    <Card key={r.id} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 44, height: 44, borderRadius: 12, background: (CAT_COLORS[r.category] || C.orange) + "15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>
                          {CAT_ICONS[r.category] || "📦"}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 700, color: C.ink }}>{r.title}</div>
                          <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
                            <span style={{ fontSize: 12, color: C.sub }}>{r.store} · Day {r.day}</span>
                            <Tag label={r.lang} color={C.blue} bg={C.blueLight} />
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 18, fontWeight: 900, color: C.ink }}>¥{r.amount}</div>
                          </div>
                          <MemberDot member={payer} size={26} />
                        </div>
                      </div>
                    </Card>
                  );
                })
              )}
            </div>
          );
        }

        // 📷 视图：AI 扫单（骨架）
        function ScanScreen() {
          return (
            <div style={{ padding: "16px 16px 90px" }}>
              <div style={{ fontSize: 20, fontWeight: 900, color: C.ink, marginBottom: 16 }}>AI 智能扫单</div>
              <Card style={{ border: `2.5px dashed ${C.orange}50`, height: 240, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.orangeLight, borderRadius: 20, cursor: "pointer" }}>
                <div style={{ fontSize: 48, marginBottom: 10 }}>📷</div>
                <div style={{ fontWeight: 800, color: C.ink, fontSize: 16 }}>点击取景框触发 AI 扫描</div>
                <div style={{ fontSize: 12, color: C.sub, marginTop: 4 }}>支持拍摄或上传日语票据小票</div>
              </Card>
            </div>
          );
        }

        // 📊 视图：数据统计与 AA 结算（骨架）
        function StatsScreen() {
          return (
            <div style={{ padding: "16px 16px 90px" }}>
              <div style={{ fontSize: 20, fontWeight: 900, color: C.ink, marginBottom: 16 }}>开销数据统计</div>
              <Card><div style={{ color: C.sub, fontSize: 14 }}>每日趋势柱状图与AA结算模块正在构建中...</div></Card>
            </div>
          );
        }

        // 👥 视图：搭子社交（骨架）
        function MembersScreen() {
          return (
            <div style={{ padding: "16px 16px 90px" }}>
              <div style={{ fontSize: 20, fontWeight: 900, color: C.ink, marginBottom: 16 }}>我的旅行搭子</div>
              <Card><div style={{ color: C.sub, fontSize: 14 }}>二维码、碰一碰与旅伴评分体系正在构建中...</div></Card>
            </div>
          );
        }

        // ─── 6. APP 核心控制骨架 ───
        function TripMateV2() {
          const [activeTab, setActiveTab] = useState("home");
          const [currentDay, setCurrentDay] = useState(25); // 当前选中天数
          const [records, setRecords] = useState(INITIAL_RECORDS);
          const [members] = useState(INITIAL_MEMBERS);
          const [note, setNote] = useState("今天计划去兼六园和金泽城，晚上吃近江町市场的海鲜饭。");
          const [isModalOpen, setIsModalOpen] = useState(false);

          // 核心控制渲染分流
          const renderScreen = () => {
            switch(activeTab) {
              case "home": 
                return <HomeScreen records={records} members={members} currentDay={currentDay} setCurrentDay={setCurrentDay} onOpenAdd={() => setIsModalOpen(true)} note={note} setNote={setNote} />;
              case "records": 
                return <RecordsScreen records={records} members={members} />;
              case "scan": 
                return <ScanScreen />;
              case "stats": 
                return <StatsScreen />;
              case "members": 
                return <MembersScreen />;
              default: 
                return <HomeScreen records={records} members={members} currentDay={currentDay} setCurrentDay={setCurrentDay} onOpenAdd={() => setIsModalOpen(true)} note={note} setNote={setNote} />;
            }
          };

          return (
            <div style={{ background: C.bg, minHeight: "100vh", position: "relative" }}>
              {/* 渲染当前活动页面 */}
              {renderScreen()}

              {/* 全局底部吸底导航栏 */}
              <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255, 255, 255, 0.96)", backdropFilter: "blur(10px)", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "10px 0 24px", zIndex: 900, boxShadow: "0 -4px 20px rgba(0,0,0,0.02)" }}>
                {TABS.map(t => {
                  const isSel = activeTab === t.key;
                  return (
                    <div key={t.key} onClick={() => setActiveTab(t.key)} style={{ display: "flex", flexDirection: "column", alignItems: "center", cursor: "pointer", minWidth: 55, padding: "4px 0" }}>
                      <span style={{ fontSize: 22, transform: isSel ? "scale(1.15)" : "scale(1)", transition: "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)" }}>{t.icon}</span>
                      <span style={{ fontSize: 10, marginTop: 4, fontWeight: 800, color: isSel ? C.orange : C.textMain, opacity: isSel ? 1 : 0.4, transition: "all 0.2s" }}>{t.label}</span>
                    </div>
                  );
                })}
              </div>

              {/* 全局快速手动记账弹窗 */}
              <QuickRecordModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} members={members} currentDay={currentDay} onSave={(newRec) => setRecords([newRec, ...records])} />
            </div>
          );
        }

        // 7. 挂载 React 根节点
        ReactDOM.createRoot(document.getElementById('root')).render(<TripMateV2 />);
    </script>
</body>
</html>
