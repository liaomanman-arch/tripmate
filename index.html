<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMate 旅行记账</title>
    <!-- 加载 React 和必要库 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 让浏览器原生支持 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #F2F4F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        * { box-sizing: border-box; }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 1. 引入修改后的 JSX 逻辑脚本 -->
    <script type="text/babel" src="./tripmate-v2.jsx"></script>

    <!-- 2. 渲染主入口组件 -->
    <script type="text/babel">
        // 确保渲染在脚本加载完成之后执行
        ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(TripMateV2)
        );
    </script>
</body>
</html>
